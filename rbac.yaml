apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiops-agent
  namespace: ai-ops-agent

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aiops-reader
rules:
- apiGroups: [""]
  resources:
    - pods
    - pods/log
    - events
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aiops-reader-binding
subjects:
- kind: ServiceAccount
  name: aiops-agent
  namespace: ai-ops-agent
roleRef:
  kind: ClusterRole
  name: aiops-reader
  apiGroup: rbac.authorization.k8s.io